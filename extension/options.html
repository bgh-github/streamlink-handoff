<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <title>Streamlink Handoff Preferences</title>
    <style>
      label {
        display: block;
        padding-bottom: 5px
      }
    </style>
  </head>
  <body>
    <form style="padding-top: 10px">
      <label>Player
        <select name="Player" id="player">
          <option value="">Streamlink default</option>
          <option value="vlc">VLC media player</option>
          <option value="mpv">mpv</option>
        </select>
      </label>
      <label>Other arguments <input type="text" id="otherArgs"></label>
      <label>Quality <input type="text" id="quality" placeholder="best"></label>
      <div id="buttons" style="padding-top: 10px">
        <button type="submit">Save</button>
        <input type="reset">
      </div>
    </form>
    <div id="link" style="padding-top: 15px"><a href="https://streamlink.github.io/cli.html">Streamlink command-line reference</a></div>
    <script src="options.js"></script>
  </body>
</html>
